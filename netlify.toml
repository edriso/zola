# Netlify configuration for Zola.
#
# Netlify is the CI/CD: it installs, runs the quality gate, builds, and deploys
# on every push. The build command fails the deploy if lint, type-check, or the
# unit/component tests fail. The app is a single page with no client-side
# routing, so no SPA redirect rule is needed.

[build]
  command = "pnpm lint && pnpm test && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
